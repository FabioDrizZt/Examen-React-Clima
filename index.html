<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consulta de Clima - Selección de Ciudad</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
  </head>
  <body>
    <div class="container">
      <h1>
        <i class="fas fa-cloud-sun"></i> Consulta de Clima - Selección de Ciudad
      </h1>

      <div class="form-container">
        <form id="formClima">
          <label for="ciudades"
            ><i class="fas fa-map-marker-alt"></i> Seleccione una ciudad:</label
          >
          <select id="ciudades"></select>
          <button type="submit" class="btn-primary">
            <i class="fas fa-search"></i> Consultar Clima
          </button>
        </form>
      </div>

      <div class="text-center mt-2">
        <a href="clima.html"
          ><i class="bi bi-thermometer-half"></i> Ir a la página de clima</a
        >
      </div>

      <h2><i class="fas fa-history"></i> Historial de Consultas</h2>
      <ul id="listaHistorial"></ul>

      <div class="action-buttons">
        <button id="verHistorial" class="btn-secondary">
          <i class="bi bi-clock-history"></i> Ver Historial de Consultas
        </button>
      </div>
    </div>

    <script src="./js/index.js"></script>
  </body>
</html>
