<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consulta de Clima - Resultados</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
  </head>
  <body>
    <div class="container">
      <h1><i class="fas fa-cloud-sun-rain"></i> Clima de la ciudad</h1>

      <div class="clima-container">
        <table id="tablaClima"></table>
      </div>

      <h2><i class="bi bi-list-ul"></i> Historial de consultas</h2>
      <ul id="listaHistorial"></ul>

      <div class="action-buttons">
        <button id="volverAtras" class="btn-outline">
          <i class="fas fa-arrow-left"></i> Volver a la Página Anterior
        </button>
        <button id="limpiarHistorial" class="btn-secondary">
          <i class="bi bi-trash"></i> Limpiar Historial
        </button>
      </div>
    </div>

    <script src="./js/clima.js"></script>
  </body>
</html>
